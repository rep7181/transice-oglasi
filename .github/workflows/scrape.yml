name: Daily Scrape

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm install

      - run: npx prisma generate

      - run: npx tsx scripts/daily-scrape.ts
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
